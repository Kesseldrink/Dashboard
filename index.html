<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            grid-template-rows: auto 1fr; 
            gap: 25px;
            padding: 30px;
            height: calc(100vh - 60px);
        }

        .widget {
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .widget-time {
            grid-column: 1 / 3; 
            align-items: flex-start; 
            background: none;
            border: none;
        }

        #time { font-size: 110px; font-weight: bold; line-height: 1; margin: 0; }
        #date { font-size: 32px; color: #8b949e; margin-top: 10px; }

        .widget-weather { grid-column: 3 / 4; font-size: 28px; }
        #weather-icon { font-size: 70px; margin: 15px 0; }

        .widget-todo {
            grid-column: 1 / 2; /* Jetzt schmaler an der Seite */
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* --- NEU: HOME ASSISTANT WIDGET --- */
        .widget-ha {
            grid-column: 2 / 4; /* Breiter Bereich für Smart Home */
            justify-content: flex-start;
            border-left: 4px solid #03a9f4; /* HA Blau */
        }

        h2 { color: #8b949e; font-size: 20px; text-transform: uppercase; margin-bottom: 20px; width: 100%; text-align: left;}

        #quest-list { list-style: none; padding: 0; font-size: 22px; width: 100%; }
        #quest-list li { margin-bottom: 15px; display: flex; gap: 10px; }

        .ha-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .ha-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="widget widget-time">
            <div id="time">00:00</div>
            <div id="date">Lade...</div>
        </div>

        <div class="widget widget-weather">
            <h2 style="text-align:center">Wetter</h2>
            <div id="weather-icon">⏳</div>
            <div id="weather-temp">-- °C</div>
        </div>

        <div class="widget widget-todo">
            <h2>Daily Quests</h2>
            <ul id="quest-list"></ul>
        </div>

        <div class="widget widget-ha">
            <h2>Smart Home (Home Assistant)</h2>
            <div class="ha-grid">
                <div class="ha-item">💡 <span>Wohnzimmer: An</span></div>
                <div class="ha-item">🌡️ <span>Heizung: 21°C</span></div>
                <div class="ha-item">🚪 <span>Haustür: Zu</span></div>
                <div class="ha-item">🔋 <span>Pi Power: OK</span></div>
            </div>
            <p style="color:#444; font-size: 12px; margin-top: 20px;">Verbunden mit HA über Lokal-IP</p>
        </div>

    </div>

    <script>
        // Uhrzeit
        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Wetter (Hamburg)
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=53.55&longitude=9.99&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-temp').innerText = Math.round(data.current_weather.temperature) + " °C";
                const code = data.current_weather.weathercode;
                const emoji = (code === 0) ? "☀️" : (code < 4) ? "🌤️" : (code < 50) ? "🌫️" : "🌧️";
                document.getElementById('weather-icon').innerText = emoji;
            } catch (e) {}
        }
        fetchWeather();
        setInterval(fetchWeather, 3600000);

        // Quests
        function loadQuests() {
            const list = document.getElementById('quest-list');
            const tasks = JSON.parse(localStorage.getItem("meineDailies")) || [];
            list.innerHTML = tasks.length ? tasks.slice(0, 4).map(t => `<li>${t.completed ? '✅' : '⬜'} ${t.text}</li>`).join('') : "<li>Alles erledigt! ☕</li>";
        }
        loadQuests();
        setInterval(loadQuests, 60000);
    </script>
</body>
</html>
