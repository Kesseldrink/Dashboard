<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000; /* Tiefschwarz spart Strom und verhindert Einbrennen */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            grid-template-rows: auto 1fr; 
            gap: 25px;
            padding: 30px;
            height: calc(100vh - 60px);
        }

        .widget {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- UHR WIDGET --- */
        .widget-time {
            grid-column: 1 / 3; 
            align-items: flex-start; 
            padding-left: 20px;
            background: none;
            border: none;
            box-shadow: none;
            justify-content: flex-start;
        }

        #time {
            font-size: 110px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #date {
            font-size: 32px;
            color: #8b949e;
            margin-top: 10px;
            font-weight: 500;
        }

        /* --- WETTER WIDGET --- */
        .widget-weather {
            grid-column: 3 / 4;
            font-size: 28px;
        }

        #weather-icon {
            font-size: 70px;
            margin: 15px 0;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        /* --- DAILY QUESTS WIDGET --- */
        .widget-todo {
            grid-column: 1 / 3;
            justify-content: flex-start;
            align-items: flex-start;
        }

        h2 {
            margin-top: 0;
            color: #7289da;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #quest-list {
            list-style: none; 
            padding: 0; 
            font-size: 26px; 
            text-align: left; 
            width: 100%;
            margin: 0;
        }

        #quest-list li {
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .completed-text {
            text-decoration: line-through;
            color: #57f287;
            opacity: 0.7;
        }

        /* --- SYSTEM INFO --- */
        .widget-system {
            justify-content: flex-start;
        }

        .sys-status {
            font-size: 20px;
            color: #8b949e;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="widget widget-time">
            <div id="time">00:00</div>
            <div id="date">Lade Datum...</div>
        </div>

        <div class="widget widget-weather">
            <h2>Hamburg</h2>
            <div id="weather-icon">⏳</div>
            <div id="weather-temp">-- °C</div>
        </div>

        <div class="widget widget-todo">
            <h2>Daily Quests</h2>
            <ul id="quest-list">
                <li>Lade Quests...</li>
            </ul>
        </div>

        <div class="widget widget-system">
            <h2>System Info</h2>
            <div class="sys-status">🟢 Pi Zero 2 W</div>
            <div class="sys-status">📡 Verbunden</div>
            <div class="sys-status" id="last-update" style="font-size: 16px; margin-top: 30px;">Letztes Update: Jetzt</div>
        </div>

    </div>

    <script>
        // --- 1. UHRZEIT & DATUM ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // Auf dem Dashboard blenden wir die Sekunden oft aus, das wirkt ruhiger
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', options);

            // Auto-Reload um 03:00 Uhr Nachts (RAM bereinigen)
            if (hours === "03" && minutes === "00" && now.getSeconds() === 0) {
                window.location.reload();
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. WETTER API ---
        function getWeatherEmoji(code) {
            if (code === 0) return "☀️"; 
            if (code >= 1 && code <= 3) return "🌤️"; 
            if (code >= 45 && code <= 48) return "🌫️"; 
            if (code >= 51 && code <= 67) return "🌧️"; 
            if (code >= 71 && code <= 77) return "❄️"; 
            if (code >= 80 && code <= 82) return "🌦️"; 
            if (code >= 95 && code <= 99) return "🌩️"; 
            return "☁️"; 
        }

        async function fetchWeather() {
            try {
                // Koordinaten für Hamburg (kannst du beliebig anpassen)
                const lat = 53.55;
                const lon = 9.99;
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                
                const response = await fetch(weatherUrl);
                const data = await response.json();

                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;

                document.getElementById('weather-temp').innerText = temp + " °C";
                document.getElementById('weather-icon').innerText = getWeatherEmoji(code);
                
                const now = new Date();
                document.getElementById('last-update').innerText = `Letztes Update: ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} Uhr`;
            } catch (error) {
                console.error("Wetter konnte nicht geladen werden.");
            }
        }
        // Wetter sofort laden und dann jede Stunde (3600000 Millisekunden) aktualisieren
        fetchWeather();
        setInterval(fetchWeather, 3600000);

        // --- 3. DAILY QUESTS LADEN ---
        function loadQuests() {
            const questList = document.getElementById('quest-list');
            const tasks = JSON.parse(localStorage.getItem("meineDailies")) || [];
            
            questList.innerHTML = "";

            if (tasks.length === 0) {
                questList.innerHTML = "<li style='color: #888;'>Keine Aufgaben für heute! ☕</li>";
                return;
            }

            // Wir zeigen maximal die ersten 5 Quests an, damit das Layout nicht platzt
            const displayTasks = tasks.slice(0, 5);

            displayTasks.forEach(task => {
                const li = document.createElement("li");
                const icon = task.completed ? "✅" : "⬜";
                const textClass = task.completed ? "completed-text" : "";
                
                li.innerHTML = `<span>${icon}</span> <span class="${textClass}">${task.text}</span>`;
                questList.appendChild(li);
            });
        }
        // Quests laden und jede Minute checken, ob sich was geändert hat
        loadQuests();
        setInterval(loadQuests, 60000);

    </script>

</body>
</html>
